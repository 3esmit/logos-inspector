name: Publish alpha release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Publish the current main version as a Core/UI LGX alpha prerelease.
        required: true
        type: boolean
        default: false
      catalog_e2e_evidence_url:
        description: URL for a successful fresh Basecamp catalog install/load check of this version.
        required: true
        type: string

# Publishing is deliberately serialized per branch.  A release run is never
# cancelled after it has started, because the publish job owns draft-release
# cleanup if any upload or verification step fails.
concurrency:
  group: release-alpha-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require an explicit alpha release from main
        env:
          CONFIRM: ${{ inputs.confirm }}
          CATALOG_E2E_EVIDENCE_URL: ${{ inputs.catalog_e2e_evidence_url }}
        run: |
          set -euo pipefail
          test "$CONFIRM" = true
          test "$GITHUB_REF" = refs/heads/main
          case "$CATALOG_E2E_EVIDENCE_URL" in
            https://*) ;;
            *)
              echo "catalog_e2e_evidence_url must be an HTTPS URL" >&2
              exit 1
              ;;
          esac
      - name: Validate source and release workflow contracts
        run: |
          set -euo pipefail
          python3 scripts/check-build-pipeline.py identity
          python3 scripts/check-release-workflow.py
      - name: Read the source release version
        id: version
        run: |
          set -euo pipefail
          version="$(python3 scripts/release_artifacts.py validate-source --root .)"
          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"
      - name: Refuse an existing tag or release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          tag="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "refusing to overwrite existing tag $tag" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "refusing to overwrite existing release $tag" >&2
            exit 1
          fi

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-amd64
            nix_system: x86_64-linux
          - runner: macos-14
            platform: darwin-arm64
            nix_system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify runner architecture
        env:
          EXPECTED_SYSTEM: ${{ matrix.nix_system }}
        run: |
          set -euo pipefail
          case "$EXPECTED_SYSTEM" in
            x86_64-linux)
              test "$(uname -s)" = Linux
              test "$(uname -m)" = x86_64
              ;;
            aarch64-darwin)
              test "$(uname -s)" = Darwin
              test "$(uname -m)" = arm64
              ;;
            *)
              echo "unsupported workflow target: $EXPECTED_SYSTEM" >&2
              exit 1
              ;;
          esac
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build the portable core and UI packages
        run: |
          set -euo pipefail
          nix build --no-write-lock-file --print-build-logs .#lgx-portable --out-link result-ui
          nix build --no-write-lock-file --print-build-logs .#core-lgx-portable --out-link result-core
      - name: Assemble and validate platform artifacts
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          python3 scripts/release_artifacts.py assemble \
            --ui-dir result-ui \
            --core-dir result-core \
            --output-dir release-artifact \
            --version "$VERSION" \
            --platform "$PLATFORM"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-artifact/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: release-artifact
          merge-multiple: true
      - name: Verify the complete release and generate checksums
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          python3 scripts/release_artifacts.py verify \
            --input-dir release-artifact \
            --version "$VERSION" \
            --platform linux-amd64 \
            --platform darwin-arm64 \
            --write-checksums
          python3 scripts/release_artifacts.py verify \
            --input-dir release-artifact \
            --version "$VERSION" \
            --platform linux-amd64 \
            --platform darwin-arm64
      - name: Write alpha release notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          # Logos Inspector v$VERSION

          **Channel:** Alpha

          This prerelease contains portable core and UI LGX packages for Linux
          x86_64 and Apple silicon macOS. Install their direct module
          dependencies from:

          https://raw.githubusercontent.com/3esmit/logos-3esmit-release/main/logos-repo.json

          A standalone downloadable artifact is not published until it has a
          self-contained runtime contract. This release is not marked as the
          latest release. See CHANGELOG.md and docs/release-process.md for
          compatibility, verification, and promotion criteria.
          EOF
      - name: Publish only a complete verified release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          tag="v$VERSION"

          cleanup_draft() {
            status=$?
            release_state="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" \
              --json isDraft,targetCommitish --jq '[.isDraft, .targetCommitish] | @tsv' 2>/dev/null || true)"
            if [ "$release_state" = "$(printf 'true\t%s' "$GITHUB_SHA")" ]; then
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            fi
            exit "$status"
          }
          trap cleanup_draft ERR

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "refusing to overwrite existing tag $tag" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "refusing to overwrite existing release $tag" >&2
            exit 1
          fi

          gh release create "$tag" release-artifact/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Logos Inspector v$VERSION (Alpha)" \
            --notes-file release-notes.md \
            --draft \
            --prerelease \
            --latest=false

          rm -rf published-artifact
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir published-artifact
          python3 scripts/release_artifacts.py verify \
            --input-dir published-artifact \
            --version "$VERSION" \
            --platform linux-amd64 \
            --platform darwin-arm64

          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease --latest=false
          trap - ERR
