name: Publish standalone app

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Publish the current main version as a standalone alpha prerelease.
        required: true
        type: boolean
        default: false

concurrency:
  group: release-inspector-standalone-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Require an explicit release from main
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          test "$CONFIRM" = true
          test "$GITHUB_REF" = refs/heads/main
      - name: Validate release contracts
        run: |
          set -euo pipefail
          python3 scripts/check-build-pipeline.py identity
          python3 scripts/check-release-workflow.py
      - name: Read source version
        id: version
        run: |
          set -euo pipefail
          version="$(python3 scripts/standalone_release.py validate-source --root .)"
          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"
      - name: Refuse an existing release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          tag="standalone-v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "refusing to overwrite existing tag $tag" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "refusing to overwrite existing release $tag" >&2
            exit 1
          fi

  build-linux:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Build AppImage
        run: |
          set -euo pipefail
          test "$(uname -s)" = Linux
          test "$(uname -m)" = x86_64
          nix build --print-build-logs .#standalone-appimage --out-link result-standalone
          source="$(find -L result-standalone -maxdepth 2 -type f -name '*.AppImage' -print -quit)"
          test -n "$source"
          mkdir release-artifact
          cp "$source" \
            "release-artifact/logos-inspector-standalone-${{ needs.validate.outputs.version }}-linux-amd64.AppImage"
          chmod +x release-artifact/*.AppImage
      - name: Install Linux graphics runtime for smoke
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libegl1
          ldconfig -p | grep -F 'libEGL.so.1'
      - name: Smoke extracted AppImage without the Nix store
        run: |
          set -euo pipefail
          artifact="$(find release-artifact -type f -name '*.AppImage' -print -quit)"
          extract="$RUNNER_TEMP/logos-inspector-appimage"
          mkdir "$extract"
          (
            cd "$extract"
            "$GITHUB_WORKSPACE/$artifact" --appimage-extract >/dev/null
          )
          python3 scripts/standalone_release.py verify-tree \
            --root "$extract/squashfs-root/usr" \
            --launcher "$extract/squashfs-root/AppRun"
          python3 scripts/standalone_release.py audit-binary-refs \
            --root "$extract/squashfs-root/usr" \
            | tee "$RUNNER_TEMP/standalone-linux-nix-string-audit.md"
          cat "$RUNNER_TEMP/standalone-linux-nix-string-audit.md" \
            >> "$GITHUB_STEP_SUMMARY"
          sudo --preserve-env=RUNNER_TEMP unshare --mount bash -s -- "$extract/squashfs-root/AppRun" <<'EOF'
          set -euo pipefail
          launcher="$1"
          mount --make-rprivate /
          mount -t tmpfs tmpfs /nix/store
          export HOME
          HOME="$(mktemp -d)"
          export QT_QPA_PLATFORM=offscreen
          export QT_QUICK_BACKEND=software
          export QSG_RHI_BACKEND=software
          "$launcher" >"$RUNNER_TEMP/standalone-linux-smoke.log" 2>&1 &
          pid=$!
          for _ in $(seq 1 10); do
            if ! kill -0 "$pid" 2>/dev/null; then
              wait "$pid" || true
              cat "$RUNNER_TEMP/standalone-linux-smoke.log" >&2
              echo "standalone exited during compiled-GUI smoke" >&2
              exit 1
            fi
            sleep 1
          done
          kill -TERM "$pid"
          wait "$pid" || test "$?" = 143
          if grep -Eiq 'failed to locate QML entry|module .* is not installed|cannot open shared object|/nix/store' \
              "$RUNNER_TEMP/standalone-linux-smoke.log"; then
            cat "$RUNNER_TEMP/standalone-linux-smoke.log" >&2
            exit 1
          fi
          EOF
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: standalone-linux-amd64
          path: release-artifact/*
          if-no-files-found: error
          retention-days: 7

  build-macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Install macOS Metal Toolchain
        run: |
          set -euo pipefail
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -downloadComponent metalToolchain
          env -u DEVELOPER_DIR -u SDKROOT xcrun --sdk macosx --find metal
          env -u DEVELOPER_DIR -u SDKROOT xcrun --sdk macosx --find metallib
      - name: Build and archive app
        run: |
          set -euo pipefail
          nix build --option sandbox false --print-build-logs \
            .#standalone-macos-app --out-link result-standalone
          app="$(find -L result-standalone -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$app"
          mkdir release-artifact
          COPYFILE_DISABLE=1 tar -czf \
            "release-artifact/logos-inspector-standalone-${{ needs.validate.outputs.version }}-darwin-arm64.app.tar.gz" \
            -C "$(dirname "$app")" "$(basename "$app")"
      - name: Smoke extracted app
        run: |
          set -euo pipefail
          artifact="$(find release-artifact -type f -name '*.app.tar.gz' -print -quit)"
          extract="$RUNNER_TEMP/logos-inspector-macos"
          mkdir "$extract"
          tar -xzf "$artifact" -C "$extract"
          app="$(find "$extract" -maxdepth 1 -type d -name '*.app' -print -quit)"
          launcher="$app/Contents/MacOS/logos-inspector-standalone-gui"
          python3 scripts/standalone_release.py verify-tree \
            --root "$app/Contents" \
            --launcher "$launcher"
          python3 scripts/standalone_release.py audit-binary-refs \
            --root "$app/Contents" \
            | tee "$RUNNER_TEMP/standalone-macos-nix-string-audit.md"
          cat "$RUNNER_TEMP/standalone-macos-nix-string-audit.md" \
            >> "$GITHUB_STEP_SUMMARY"
          export QT_QPA_PLATFORM=offscreen
          export QT_QUICK_BACKEND=software
          export QSG_RHI_BACKEND=software
          "$launcher" >"$RUNNER_TEMP/standalone-macos-smoke.log" 2>&1 &
          pid=$!
          for _ in $(seq 1 10); do
            if ! kill -0 "$pid" 2>/dev/null; then
              wait "$pid" || true
              cat "$RUNNER_TEMP/standalone-macos-smoke.log" >&2
              echo "standalone exited during compiled-GUI smoke" >&2
              exit 1
            fi
            sleep 1
          done
          kill -TERM "$pid"
          wait "$pid" || test "$?" = 143
          if grep -Eiq 'failed to locate QML entry|module .* is not installed|Library not loaded|/nix/store' \
              "$RUNNER_TEMP/standalone-macos-smoke.log"; then
            cat "$RUNNER_TEMP/standalone-macos-smoke.log" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: standalone-darwin-arm64
          path: release-artifact/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs:
      - validate
      - build-linux
      - build-macos
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: standalone-*
          path: release-artifact
          merge-multiple: true
      - name: Verify complete artifact set
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          python3 scripts/standalone_release.py verify \
            --input-dir release-artifact --version "$VERSION" --write-checksums
          python3 scripts/standalone_release.py verify \
            --input-dir release-artifact --version "$VERSION"
      - name: Write release notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          # Logos Inspector standalone v$VERSION

          **Channel:** Alpha

          Native standalone bundles:

          - Linux x86_64 AppImage
          - unsigned Apple silicon macOS app archive

          Linux requires a working host graphics stack that exposes
          \`libEGL.so.1\` (Ubuntu package: \`libegl1\`). Graphics and GPU driver
          libraries stay host-provided so they match recipient hardware.

          Each artifact is built and smoke-tested on its native platform after
          extraction. The Linux smoke runs with the build host's Nix store
          hidden. See SHA256SUMS and docs/release-process.md.
          EOF
      - name: Create draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: standalone-v${{ needs.validate.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Logos Inspector standalone v${{ needs.validate.outputs.version }} (Alpha)
          body_path: release-notes.md
          draft: true
          prerelease: true
          make_latest: false
          files: |
            release-artifact/*.AppImage
            release-artifact/*.app.tar.gz
            release-artifact/SHA256SUMS
      - name: Verify uploaded draft
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          tag="standalone-v$VERSION"
          mkdir published-artifact
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir published-artifact
          python3 scripts/standalone_release.py verify \
            --input-dir published-artifact --version "$VERSION"
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" \
            --draft=false --prerelease --latest=false
      - name: Remove failed draft
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          tag="standalone-v$VERSION"
          state="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" \
            --json isDraft,targetCommitish \
            --jq '[.isDraft, .targetCommitish] | @tsv' 2>/dev/null || true)"
          if test "$state" = "$(printf 'true\t%s' "$GITHUB_SHA")"; then
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          fi
