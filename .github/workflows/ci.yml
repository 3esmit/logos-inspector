name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Rust
        run: rustup show
      - name: Install Qt 6 development files
        run: |
          sudo apt-get update
          sudo apt-get install --yes qt6-base-dev
      - name: Verify build pipeline
        run: python3 scripts/check-build-pipeline.py ci
