name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup show
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Install Logos circuits
        run: |
          python3 scripts/setup-circuits.py v0.5.3 "$RUNNER_TEMP/logos-blockchain-circuits"
          echo "LOGOS_BLOCKCHAIN_CIRCUITS=$RUNNER_TEMP/logos-blockchain-circuits" >> "$GITHUB_ENV"
      - name: Check Rust crate
        run: RISC0_SKIP_BUILD=1 cargo check
      - name: Check lints
        run: RISC0_SKIP_BUILD=1 cargo clippy --all-targets -- -D warnings
