<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logos Inspector</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="side">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div>
            <div class="brand-title">Logos Inspector</div>
            <div class="brand-subtitle" id="cliState">checking</div>
          </div>
        </div>

        <nav class="nav" aria-label="Sections">
          <button class="nav-item is-active" data-view="overview" type="button">Overview</button>
          <button class="nav-item" data-view="blockchain" type="button">Blockchain</button>
          <button class="nav-item" data-view="channels" type="button">Channels</button>
          <button class="nav-item" data-view="storage" type="button">Storage</button>
          <button class="nav-item" data-view="messaging" type="button">Messaging</button>
          <button class="nav-item" data-view="capabilities" type="button">Capabilities</button>
          <button class="nav-item" data-view="lez" type="button">LEZ</button>
          <button class="nav-item" data-view="spel" type="button">SPEL</button>
          <button class="nav-item" data-view="raw" type="button">Raw</button>
        </nav>

        <form class="endpoint-form" id="endpointForm">
          <label for="sequencerInput">Sequencer</label>
          <input id="sequencerInput" name="sequencer" spellcheck="false">
          <label for="indexerInput">Indexer</label>
          <input id="indexerInput" name="indexer" spellcheck="false">
          <label for="nodeInput">Node</label>
          <input id="nodeInput" name="node" spellcheck="false">
          <button type="submit">Apply</button>
        </form>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <div class="eyebrow">Local inspector</div>
            <h1 id="viewTitle">Overview</h1>
          </div>
          <div class="top-actions">
            <button class="secondary" id="refreshBtn" type="button">Refresh</button>
            <button class="secondary" id="buildBtn" type="button">Build</button>
          </div>
        </header>

        <section class="view is-active" id="view-overview">
          <div class="metrics">
            <article class="metric">
              <span>Sequencer head</span>
              <strong id="metricSequencerHead">-</strong>
            </article>
            <article class="metric">
              <span>Indexer head</span>
              <strong id="metricIndexerHead">-</strong>
            </article>
            <article class="metric">
              <span>Cryptarchia</span>
              <strong id="metricCryptarchia">-</strong>
            </article>
            <article class="metric">
              <span>Modules</span>
              <strong id="metricModules">-</strong>
            </article>
          </div>
          <div class="tool-grid">
            <article class="panel">
              <div class="panel-head">
                <h2>Explorer overview</h2>
                <button id="overviewBtn" type="button">Refresh</button>
              </div>
              <div class="result-panel" id="overviewResult"></div>
            </article>
            <article class="panel">
              <div class="panel-head">
                <h2>Module overview</h2>
                <button class="secondary" id="modulesBtn" type="button">Load</button>
              </div>
              <div class="result-panel" id="modulesResult"></div>
            </article>
          </div>
        </section>

        <section class="view" id="view-blockchain">
          <div class="tool-grid">
            <article class="panel">
              <div class="panel-head">
                <h2>Node REST</h2>
                <button id="blockchainNodeBtn" type="button">Refresh</button>
              </div>
              <div class="result-panel" id="blockchainNodeResult"></div>
            </article>
            <article class="panel">
              <div class="panel-head">
                <h2>Blocks</h2>
              </div>
              <form class="form-row three" id="blockchainBlocksForm">
                <label>
                  Slot from
                  <input id="blockchainSlotFrom" inputmode="numeric">
                </label>
                <label>
                  Slot to
                  <input id="blockchainSlotTo" inputmode="numeric">
                </label>
                <button type="submit">Load</button>
              </form>
              <div class="result-panel" id="blockchainBlocksResult"></div>
            </article>
          </div>
        </section>

        <section class="view" id="view-channels">
          <article class="panel">
            <div class="panel-head">
              <h2>Channel scan</h2>
            </div>
            <form class="form-row three" id="channelForm">
              <label>
                Slot from
                <input id="channelSlotFrom" inputmode="numeric">
              </label>
              <label>
                Slot to
                <input id="channelSlotTo" inputmode="numeric">
              </label>
              <button type="submit">Scan</button>
            </form>
            <div class="result-panel" id="channelResult"></div>
          </article>
        </section>

        <section class="view" id="view-storage">
          <article class="panel">
            <div class="panel-head">
              <h2>Storage module</h2>
              <button id="storageBtn" type="button">Refresh</button>
            </div>
            <form class="form-row" id="storageForm">
              <label>
                CID
                <input id="storageCid" spellcheck="false">
              </label>
              <button class="secondary" type="submit">Lookup</button>
            </form>
            <div class="result-panel" id="storageResult"></div>
          </article>
        </section>

        <section class="view" id="view-messaging">
          <article class="panel">
            <div class="panel-head">
              <h2>Messaging module</h2>
              <button id="messagingBtn" type="button">Refresh</button>
            </div>
            <form class="form-row" id="messagingForm">
              <label>
                Info id
                <input id="messagingInfoId" spellcheck="false">
              </label>
              <button class="secondary" type="submit">Lookup</button>
            </form>
            <div class="result-panel" id="messagingResult"></div>
          </article>
        </section>

        <section class="view" id="view-capabilities">
          <article class="panel">
            <div class="panel-head">
              <h2>Capabilities</h2>
              <div class="segmented">
                <button id="capabilitiesBtn" type="button">Capability</button>
                <button id="allModulesBtn" type="button">All</button>
              </div>
            </div>
            <div class="result-panel" id="capabilitiesResult"></div>
          </article>
        </section>

        <section class="view" id="view-lez">
          <div class="tool-grid">
            <article class="panel">
              <div class="panel-head">
                <h2>Sequencer</h2>
                <div class="segmented">
                  <button id="lezHeadBtn" type="button">Head</button>
                  <button id="lezProgramsBtn" type="button">Programs</button>
                </div>
              </div>
              <form class="form-row" id="lezBlockForm">
                <label>
                  Block id
                  <input id="lezBlockId" inputmode="numeric">
                </label>
                <button type="submit">Block</button>
              </form>
              <form class="form-row" id="lezTxForm">
                <label>
                  Transaction hash
                  <input id="lezTxHash" spellcheck="false">
                </label>
                <button type="submit">Transaction</button>
              </form>
              <form class="form-row" id="lezAccountForm">
                <label>
                  Account id
                  <input id="lezAccountId" spellcheck="false">
                </label>
                <button type="submit">Account</button>
              </form>
              <div class="result-panel" id="lezResult"></div>
            </article>
            <article class="panel">
              <div class="panel-head">
                <h2>Indexer RPC</h2>
              </div>
              <form class="form-row" id="indexerRpcForm">
                <label>
                  Method
                  <input id="indexerMethod" value="getLastFinalizedBlockId" spellcheck="false">
                </label>
                <button type="submit">Call</button>
              </form>
              <textarea id="indexerParams" spellcheck="false">[]</textarea>
              <div class="result-panel" id="indexerResult"></div>
            </article>
          </div>
        </section>

        <section class="view" id="view-spel">
          <article class="panel">
            <div class="panel-head">
              <h2>SPEL IDL</h2>
              <button id="spelBtn" type="button">Summarize</button>
            </div>
            <textarea id="spelIdlJson" spellcheck="false"></textarea>
            <div class="result-panel" id="spelResult"></div>
          </article>
        </section>

        <section class="view" id="view-raw">
          <article class="panel">
            <div class="panel-head">
              <h2>CLI command</h2>
            </div>
            <form class="form-row" id="rawCliForm">
              <label>
                Command
                <input id="rawCommand" value="overview" spellcheck="false">
              </label>
              <button type="submit">Run</button>
            </form>
            <textarea id="rawArgs" spellcheck="false">[]</textarea>
            <div class="result-panel" id="rawResult"></div>
          </article>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
